<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fortnite Loadout Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Loadout Trainer</h1>

<div id="game">
  <div id="loot"></div>

  <h2>Inventory</h2>
  <div id="inventory">
    <div class="slot" data-slot="1">1 (AR)</div>
    <div class="slot" data-slot="2">2 (Shotgun)</div>
    <div class="slot" data-slot="3">3 (Flex)</div>
    <div class="slot" data-slot="4">4 (Movement)</div>
    <div class="slot" data-slot="5">5 (Sniper)</div>
  </div>

  <button onclick="startGame()">Start</button>
  <h3 id="result"></h3>

  <button onclick="checkLoadout()">Check Loadout</button>
</div>

<script src="script.js"></script>
</body>
</html>
